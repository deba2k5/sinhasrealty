<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sinha's GmbH — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0f1e;
      --surface: #101728;
      --surface2: #151d30;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-lt: #818cf8;
      --green: #34d399;
      --red: #f87171;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(34, 211, 238, 0.06) 0%, transparent 60%);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 16px var(--primary);
      margin-bottom: 1rem;
    }

    .logo-area h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-area p {
      color: var(--muted2);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card>p {
      font-size: 0.85rem;
      color: var(--muted2);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted2);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.35);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 0 32px rgba(99, 102, 241, 0.5);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .loader {
      display: none;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-box {
      display: none;
      padding: 11px 14px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 9px;
      color: var(--red);
      font-size: 0.87rem;
      font-weight: 500;
      margin-top: 1rem;
      text-align: center;
    }

    .footer-note {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-dot"></div>
      <h1>Sinha's GmbH</h1>
      <p>Property Data Management System</p>
    </div>

    <div class="card">
      <h2>Welcome back</h2>
      <p>Sign in to access your dashboard</p>

      <div class="field">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        <span id="btnText">Sign In</span>
        <div class="loader" id="loader"></div>
      </button>

      <div class="error-box" id="errorBox"></div>
    </div>

    <div class="footer-note">Sinha's GmbH · Secure Portal</div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDy2fY-RorwHr5wnjUTjHesKo992e5BUP8",
      authDomain: "sinhasgmbh-da880.firebaseapp.com",
      projectId: "sinhasgmbh-da880",
      storageBucket: "sinhasgmbh-da880.firebasestorage.app",
      messagingSenderId: "103734138273",
      appId: "1:103734138273:web:be383933f0fad2c55767e0",
      measurementId: "G-JH3RX8Q88P"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);

    const AUTHORIZED_EMAILS = [
      'rajeev@sinhas.ch',
      'soumika@sinhas.ch',
      'megha@sinhas.ch',
      'rishu@sinhas.ch',
      'sushmit@sinhas.ch',
      'nirmalya@sinhas.ch',
      'debangshu@sinhas.ch'
    ];

    // If already signed in, redirect immediately
    onAuthStateChanged(auth, user => {
      if (user) {
        if (AUTHORIZED_EMAILS.includes(user.email)) {
          window.location.href = '/';
        }
      }
    });

    window.doLogin = async function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('btnText');
      const ldr = document.getElementById('loader');
      const err = document.getElementById('errorBox');

      if (!email || !password) {
        err.textContent = 'Please enter your email and password.';
        err.style.display = 'block';
        return;
      }

      txt.style.display = 'none';
      ldr.style.display = 'block';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        if (!AUTHORIZED_EMAILS.includes(user.email)) {
          await auth.signOut();
          throw new Error('Access denied. You are not authorized to use this portal.');
        }

        // Redirect to portal
        window.location.href = '/';

      } catch (e) {
        let msg = 'Invalid email or password. Please try again.';
        if (e.message.includes('not authorized')) msg = e.message;
        if (e.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Please try again later.';
        err.textContent = msg;
        err.style.display = 'block';
      } finally {
        txt.style.display = '';
        ldr.style.display = 'none';
        btn.disabled = false;
      }
    };

    // Allow pressing Enter to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.doLogin();
      });
    });
  </script>
</body>

</html>
