<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinha's Mortgage Register Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --bg:#0a0f1e; --surface:#101728; --border:rgba(255,255,255,0.08);
      --primary:#6366f1; --accent:#22d3ee; --green:#34d399; --red:#f87171; --text:#f1f5f9; --muted:#64748b;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    .container { max-width:1200px; margin:auto; padding:20px; }
    .section { margin-bottom:40px; }
    .btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-secondary { background:var(--accent); color:#fff; }
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-top:20px; }
    .upload-form { display:flex; gap:10px; align-items:center; margin-bottom:20px; }
  </style>
</head>
<body>
<div class="container" id="dashboardWrapper">
  <h1>Sinha's Mortgage Register Dashboard</h1>

  <div class="upload-form">
    <input type="file" id="mortgageFile" accept=".xlsx,.xls" />
    <button class="btn btn-primary" id="uploadBtn">Upload Register</button>
    <span id="uploadStatus"></span>
  </div>

  <div class="section">
    <h2>Key Metrics</h2>
    <div class="chart-card">
      <canvas id="ltvChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <canvas id="costChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <canvas id="typeChart" height="200"></canvas>
    </div>
  </div>

  <div class="section">
    <button class="btn btn-secondary" id="pdfBtn">Download PDF Report</button>
    <a class="btn btn-primary" id="excelBtn" href="/api/export-excel?collection=mortgage_register">Download Updated Excel</a>
  </div>
</div>

<script>
  // Upload handling
  document.getElementById('uploadBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('mortgageFile');
    const statusEl = document.getElementById('uploadStatus');
    if (!fileInput.files.length) { statusEl.textContent = 'Select a file first.'; return; }
    const form = new FormData();
    form.append('file', fileInput.files[0]);
    try {
      const resp = await fetch('/upload_mortgage_register', { method:'POST', body:form });
      const data = await resp.json();
      statusEl.textContent = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
      if (data.success) loadStats();
    } catch (e) { statusEl.textContent = 'Upload failed.'; console.error(e); }
  });

  // Load stats and render charts
  async function loadStats() {
    const res = await fetch('/api/mortgage/stats');
    const { ltv_distribution, acquisition_cost_distribution, mortgage_type } = await res.json();
    // LTV Pie
    const ltvCtx = document.getElementById('ltvChart').getContext('2d');
    new Chart(ltvCtx, {
      type:'pie',
      data:{
        labels: ltv_distribution.map(d=>d._id),
        datasets:[{ data: ltv_distribution.map(d=>d.count), backgroundColor:['#6366f1','#22d3ee','#34d399','#f87171','#fbbf24','#a78bfa'] }]
      },
      options:{responsive:true, plugins:{legend:{position:'right'}}}
    });
    // Acquisition Cost Bar
    const costCtx = document.getElementById('costChart').getContext('2d');
    new Chart(costCtx, {
      type:'bar',
      data:{
        labels: acquisition_cost_distribution.map(d=>d._id),
        datasets:[{ label:'Properties', data: acquisition_cost_distribution.map(d=>d.count), backgroundColor:'#22d3ee' }]
      },
      options:{responsive:true, scales:{y:{beginAtZero:true}}}
    });
    // Mortgage Type Doughnut
    const typeCtx = document.getElementById('typeChart').getContext('2d');
    const initialCount = (mortgage_type.initial[0] && mortgage_type.initial[0].count) || 0;
    const refinancedCount = (mortgage_type.refinanced[0] && mortgage_type.refinanced[0].count) || 0;
    new Chart(typeCtx, {
      type:'doughnut',
      data:{
        labels:['Initial','Refinanced'],
        datasets:[{ data:[initialCount, refinancedCount], backgroundColor:['#6366f1','#f87171'] }]
      },
      options:{responsive:true, plugins:{legend:{position:'bottom'}}}
    });
  }

  // PDF generation
  document.getElementById('pdfBtn').addEventListener('click', async () => {
    const { jsPDF } = window.jspdf;
    const wrapper = document.getElementById('dashboardWrapper');
    const canvas = await html2canvas(wrapper, {scale:2});
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p','mm','a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
    pdf.addImage(imgData,'PNG',0,0,pdfWidth,pdfHeight);
    pdf.save('mortgage_report.pdf');
  });

  // Initial load
  loadStats();
</script>
</body>
</html>
